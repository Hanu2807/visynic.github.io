<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VISYNIC | Login</title>
  <meta name="description" content="VISYNIC login page." />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap");
    :root{
      --bg:#070a12;
      --card:#0d1324;
      --text:#e8ecff;
      --muted:#a7b0d6;
      --accent:#4a7dff;
      --accent2:#ff3d57;
      --border: rgba(255,255,255,0.10);
      --font-body: "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-heading: "Space Grotesk", "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:var(--font-body);background: radial-gradient(1200px 700px at 10% 10%, rgba(74,125,255,0.22), transparent 55%), radial-gradient(900px 600px at 90% 25%, rgba(255,61,87,0.18), transparent 55%), repeating-linear-gradient(120deg, rgba(255,255,255,0.035) 0, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 32px), var(--bg); color:var(--text)}
    a{color:inherit;text-decoration:none}
    .container{width:min(1100px,92vw);margin:0 auto}

    nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:rgba(7,10,18,0.55);border-bottom:1px solid var(--border)}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
    .brand{display:flex;gap:10px;align-items:center;font-weight:800;letter-spacing:0.6px;font-family:var(--font-heading)}
    .dot{width:10px;height:10px;border-radius:99px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 30px rgba(74,125,255,0.45)}
    .nav-links{display:flex;gap:18px;align-items:center;font-weight:600;color:var(--muted)}
    .nav-links a{padding:8px 10px;border-radius:12px}
    .nav-links a:hover{background:rgba(255,255,255,0.06);color:var(--text)}

    main{padding:38px 0}
    .card{max-width:520px;margin:0 auto;background:rgba(13,19,36,0.6);border:1px solid var(--border);border-radius:22px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,0.35)}
    h1{font-family:var(--font-heading);margin:0 0 10px}
    p{margin:0;color:var(--muted);line-height:1.7}
    form{display:grid;gap:12px;margin-top:14px}
    input{width:100%;padding:12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);outline:none;font-weight:600}
    .btn{padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-weight:800;cursor:pointer}
    .btn.login{background:linear-gradient(135deg, rgba(74,125,255,0.95), rgba(74,125,255,0.55));border-color:rgba(74,125,255,0.45)}
    .btn.google{background:linear-gradient(135deg, rgba(255,61,87,0.95), rgba(255,61,87,0.65));border-color:rgba(255,61,87,0.45)}
    .divider{display:flex;align-items:center;gap:10px;margin:12px 0}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
    .divider span{color:var(--muted);font-size:12px;font-weight:700}
    .note{margin-top:10px;font-size:13px;color:var(--muted);font-weight:700;min-height:20px}
    .signed-state{
      margin-top:14px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);
      font-weight:800;
      color:var(--text);
      display:none;
      text-align:center;
    }
    .signed-state.show{display:block}

    @media (max-width: 920px){
      .nav-links{gap:8px;font-size:14px}
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-inner">
        <div class="brand"><div class="dot"></div><div>VISYNIC</div></div>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="work.html" id="productionNavLink">Production</a>
          <a href="team.html" id="teamNavLink">Team</a>
          <a href="admin.html" id="adminNavLink">Admin</a>
          <a href="contact.html">Contact</a>
          <a href="auth.html" id="authNavLink">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="card">
      <h1>Login</h1>
      <p>Sign in to continue to VISYNIC team tools.</p>
      <form id="authForm">
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password" required minlength="6" />
        <button class="btn login" id="submitBtn" type="submit">Log In</button>
      </form>
      <div class="divider" id="orDivider"><span>OR</span></div>
      <button class="btn google" id="googleSignInBtn" type="button">Continue with Google</button>
      <div class="signed-state" id="signedStateText">Signed in</div>
      <div class="note" id="statusText"></div>
    </section>
  </main>

  <script type="module">
    import {
      GoogleAuthProvider,
      onAuthStateChanged,
      signInWithPopup,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { auth, firebaseReady, saveMemberProfile } from "./assets/js/firebase-client.js";

    const statusText = document.getElementById("statusText");
    const authForm = document.getElementById("authForm");
    const orDivider = document.getElementById("orDivider");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const googleSignInBtn = document.getElementById("googleSignInBtn");
    const signedStateText = document.getElementById("signedStateText");
    let redirectScheduled = false;

    function setSignedInUi() {
      authForm.style.display = "none";
      orDivider.style.display = "none";
      googleSignInBtn.style.display = "none";
      statusText.textContent = "";
      signedStateText.classList.add("show");
      signedStateText.textContent = "Signed in";
    }

    function scheduleHomeRedirect() {
      if (redirectScheduled) return;
      redirectScheduled = true;
      window.setTimeout(() => {
        window.location.href = "index.html";
      }, 800);
    }

    if (!firebaseReady || !auth) {
      statusText.textContent = "Authentication temporarily unavailable.";
      authForm.querySelectorAll("input,button").forEach((el) => { el.disabled = true; });
      googleSignInBtn.disabled = true;
    } else {
      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        await saveMemberProfile(user, "");
        setSignedInUi();
        scheduleHomeRedirect();
      });
    }

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusText.textContent = "Signing in...";

      try {
        const cred = await signInWithEmailAndPassword(auth, email.value.trim(), password.value.trim());
        await saveMemberProfile(cred.user, "");
        setSignedInUi();
        scheduleHomeRedirect();
      } catch (err) {
        statusText.textContent = err.message || "Login failed.";
      }
    });

    googleSignInBtn.addEventListener("click", async () => {
      statusText.textContent = "Opening Google sign-in...";
      try {
        const provider = new GoogleAuthProvider();
        const cred = await signInWithPopup(auth, provider);
        await saveMemberProfile(cred.user, cred.user.displayName || "");
        setSignedInUi();
        scheduleHomeRedirect();
      } catch (err) {
        statusText.textContent = err.message || "Google sign-in failed.";
      }
    });
  </script>
  <script type="module" src="assets/js/nav-auth.js"></script>
</body>
</html>
