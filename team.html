<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VISYNIC | Production Team</title>
  <meta name="description" content="VISYNIC production team dashboard for pre-production, production, and post-production." />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap");
    :root{
      --bg:#070a12;
      --card:#0d1324;
      --text:#e8ecff;
      --muted:#a7b0d6;
      --accent:#4a7dff;
      --accent2:#ff3d57;
      --border: rgba(255,255,255,0.10);
      --font-body: "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-heading: "Space Grotesk", "Manrope", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:var(--font-body);background: radial-gradient(1200px 700px at 10% 10%, rgba(74,125,255,0.22), transparent 55%),
      radial-gradient(900px 600px at 90% 25%, rgba(255,61,87,0.18), transparent 55%),
      repeating-linear-gradient(120deg, rgba(255,255,255,0.035) 0, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 32px),
      var(--bg);
      color:var(--text);
    }
    .container{width:min(1180px, 92vw); margin:0 auto;}
    a{color:inherit;text-decoration:none}
    nav{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(16px);
      background: rgba(7,10,18,0.55);
      border-bottom:1px solid var(--border);
    }
    .nav-inner{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 0;
    }
    .brand{
      display:flex; gap:10px; align-items:center;
      font-weight:800; letter-spacing:0.6px;
      font-family: var(--font-heading);
    }
    .dot{
      width:10px;height:10px;border-radius:99px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 30px rgba(74,125,255,0.45);
    }
    .nav-links{display:flex; gap:18px; align-items:center; font-weight:600; color:var(--muted)}
    .nav-links a{padding:8px 10px;border-radius:12px}
    .nav-links a:hover{background: rgba(255,255,255,0.06); color:var(--text)}
    main{padding:24px 0 48px}
    .page-head{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    h1,h2,h3{font-family:var(--font-heading)}
    h1{margin:0}
    p{color:var(--muted)}
    .member-card,.entry-card{
      background: rgba(13,19,36,0.6);
      border:1px solid var(--border);
      border-radius:20px;
      padding:16px;
      margin-bottom:14px;
    }
    .member-row{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      color:var(--muted);
      font-weight:700;
      margin-top:6px;
    }
    form{
      display:grid;
      grid-template-columns: 160px 1fr 1fr auto;
      gap:10px;
      align-items:center;
    }
    select,input,button{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-weight:600;
    }
    button{
      cursor:pointer;
      background: linear-gradient(135deg, rgba(74,125,255,0.95), rgba(255,61,87,0.9));
      font-weight:800;
    }
    .status{
      min-height:20px;
      margin-top:8px;
      color:var(--muted);
      font-weight:700;
      font-size:13px;
    }
    .boards{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
      margin-top:14px;
    }
    .board{
      background: rgba(13,19,36,0.6);
      border:1px solid var(--border);
      border-radius:20px;
      padding:14px;
      min-height:280px;
    }
    .board h3{margin:0 0 12px}
    .item{
      border:1px solid var(--border);
      border-radius:14px;
      background: rgba(255,255,255,0.03);
      padding:10px;
      margin-bottom:10px;
    }
    .item b{
      display:block;
      margin-bottom:4px;
      font-size:14px;
    }
    .meta{
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }
    @media (max-width: 980px){
      form{grid-template-columns:1fr}
      .boards{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-inner">
        <div class="brand">
          <div class="dot"></div>
          <div>VISYNIC</div>
        </div>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="work.html">Projects</a>
          <a href="team.html" id="teamNavLink">Production Team</a>
          <a href="contact.html">Contact</a>
          <a href="auth.html" id="authNavLink">Login / Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-head">
      <div>
        <h1>Production Team Workspace</h1>
        <p>Shared board for pre-production, production, and post-production activities.</p>
      </div>
    </div>

    <section class="member-card">
      <h3>Member</h3>
      <div class="member-row">
        <span id="memberName">Name: -</span>
        <span id="memberEmail">Email: -</span>
        <span id="memberId">Member ID: -</span>
      </div>
    </section>

    <section class="entry-card">
      <h3>Add Team Item</h3>
      <form id="addItemForm">
        <select id="phase" required>
          <option value="pre">Pre-Production</option>
          <option value="prod">Production</option>
          <option value="post">Post-Production</option>
        </select>
        <input id="title" placeholder="Task title" required />
        <input id="details" placeholder="Details / links / notes" required />
        <button type="submit">Add</button>
      </form>
      <div class="status" id="statusText"></div>
    </section>

    <section class="boards">
      <div class="board">
        <h3>Pre-Production</h3>
        <div id="preList"></div>
      </div>
      <div class="board">
        <h3>Production</h3>
        <div id="prodList"></div>
      </div>
      <div class="board">
        <h3>Post-Production</h3>
        <div id="postList"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      addDoc,
      collection,
      doc,
      getDoc,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { auth, db, firebaseReady, saveMemberProfile } from "./assets/js/firebase-client.js";

    const statusText = document.getElementById("statusText");
    const form = document.getElementById("addItemForm");
    const phaseEl = document.getElementById("phase");
    const titleEl = document.getElementById("title");
    const detailsEl = document.getElementById("details");

    const listMap = {
      pre: document.getElementById("preList"),
      prod: document.getElementById("prodList"),
      post: document.getElementById("postList")
    };

    const memberNameEl = document.getElementById("memberName");
    const memberEmailEl = document.getElementById("memberEmail");
    const memberIdEl = document.getElementById("memberId");

    let activeUser = null;
    let memberProfile = null;

    function renderItems(items) {
      Object.values(listMap).forEach((container) => container.innerHTML = "");
      items.forEach((item) => {
        const bucket = listMap[item.phase];
        if (!bucket) return;
        const createdDate = item.createdAt?.toDate ? item.createdAt.toDate().toLocaleString() : "Just now";
        const card = document.createElement("article");
        card.className = "item";
        card.innerHTML = `
          <b>${item.title}</b>
          <div>${item.details}</div>
          <div class="meta">By: ${item.createdByName || item.createdByUid || "Unknown"} | ${createdDate}</div>
        `;
        bucket.appendChild(card);
      });
    }

    if (!firebaseReady || !auth || !db) {
      statusText.textContent = "Team workspace is temporarily unavailable. Please contact the site admin.";
      form.querySelectorAll("input,button,select").forEach((el) => el.disabled = true);
    } else {
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "auth.html?next=team.html";
          return;
        }
        activeUser = user;
        memberProfile = await saveMemberProfile(user, "");
        if (!memberProfile) {
          const fallbackRef = await getDoc(doc(db, "users", user.uid));
          memberProfile = fallbackRef.exists() ? fallbackRef.data() : null;
        }

        memberNameEl.textContent = `Name: ${memberProfile?.fullName || "No name set"}`;
        memberEmailEl.textContent = `Email: ${user.email || "-"}`;
        memberIdEl.textContent = `Member ID: ${memberProfile?.memberId || "-"}`;
      });

      const itemQuery = query(collection(db, "teamItems"), orderBy("createdAt", "desc"));
      onSnapshot(itemQuery, (snapshot) => {
        const items = snapshot.docs.map((record) => ({ id: record.id, ...record.data() }));
        renderItems(items);
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!activeUser) return;
      statusText.textContent = "Adding item...";
      try {
        await addDoc(collection(db, "teamItems"), {
          phase: phaseEl.value,
          title: titleEl.value.trim(),
          details: detailsEl.value.trim(),
          createdByUid: activeUser.uid,
          createdByName: memberProfile?.fullName || activeUser.email || "Member",
          createdAt: serverTimestamp()
        });
        form.reset();
        statusText.textContent = "Item added.";
      } catch (err) {
        statusText.textContent = err.message || "Failed to add item.";
      }
    });
  </script>
  <script type="module" src="assets/js/nav-auth.js"></script>
</body>
</html>
